@if (loading()) {
  <p>Carregando recomendações...</p>
}
@else {
  <p>{{ user.name }}</p>

<ul>
  @for (game of random_games(); track game.id) {
    <li
      (click)="toggleGame(game)"
      [class.selected]="selectedGames().some(g => g.id === game.id)"
    >
      {{ game.name }} - {{ game.genre }}
    </li>
  }
</ul>

<p>Selecionados: {{ selectedGames().length }}/5</p>

<button (click)="sendSelectedGames()">
  Enviar
</button>
}
