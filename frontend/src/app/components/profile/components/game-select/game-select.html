<div class="select-header">
  <p class="select-label">Selecione de 5 a 10 jogos dos nossos mais populares</p>
  <span class="select-count" [class.complete]="selectedIds().size >= MIN_SELECTED">
    {{ selectedCount() }} selecionados
  </span>
</div>

<ul class="game-grid">
  @for (game of games(); track game.id) {
    <li class="game-card" [class.selected]="selectedIds().has(game.id)" (click)="toggle(game)">
      <div class="game-card-check">
        @if (selectedIds().has(game.id)) {
          <fa-icon [icon]="icons.faCheck" />
        }
      </div>
      <span class="game-name">{{ game.name }}</span>
      <span class="game-tag">{{ game.genre }}</span>
      <span class="game-tag">{{ game.category }}</span>
      <span class="game-tag">{{ game.perspective }}</span>
    </li>
  }
</ul>

<button class="btn" [disabled]="!canConfirm()" (click)="confirm()">
  Ir para avaliação
  <fa-icon [icon]="icons.faArrowRight" />
</button>
